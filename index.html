<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Tic-Tac-Toe</h1>
      <p class="status" id="status">Player <span id="currentPlayer">X</span>'s turn</p>
    </header>

    <section class="board" id="board" aria-label="Tic Tac Toe board">
      <!-- 9 cells rendered by JS -->
    </section>

    <div class="controls">
      <button class="button" id="restartBtn" type="button">Restart Game</button>
    </div>

    <footer class="footer">
      <small>Click a square to place your mark. Enjoy!</small>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
